<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iliy アンケート</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:#FAF7F2;--warm-white:#FFFEFB;--dark:#1C1A18;--muted:#7A7570;
    --accent:#C4956A;--accent-light:#F0E6D8;--border:#E8E0D5;
    --success:#5A8A6A;--error:#C46A6A;
    --flower:#D4729A;--flower-light:#FBEAF0;--flower-border:#ED93B1;
    --prop:#6A8AC4;--prop-light:#E6EDFA;--prop-border:#85A7EB;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--cream);color:var(--dark);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;}
  .header{background:var(--warm-white);border-bottom:1px solid var(--border);padding:18px 24px;text-align:center;position:relative;}
  .header-title{font-size:18px;font-weight:500;letter-spacing:.08em;}
  .header-sub{font-size:11px;color:var(--muted);margin-top:4px;}
  .progress-wrap{background:var(--warm-white);padding:14px 24px 0;border-bottom:1px solid var(--border);}
  .progress-steps{display:flex;justify-content:center;max-width:600px;margin:0 auto;}
  .step-item{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;}
  .step-item:not(:last-child)::after{content:'';position:absolute;top:13px;left:50%;width:100%;height:1px;background:var(--border);z-index:0;}
  .step-item.done:not(:last-child)::after,.step-item.active:not(:last-child)::after{background:var(--accent);}
  .step-dot{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:var(--warm-white);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);position:relative;z-index:1;transition:all .3s;}
  .step-item.active .step-dot{border-color:var(--accent);background:var(--accent);color:white;}
  .step-item.done .step-dot{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
  .step-label{font-size:9px;color:var(--muted);margin-top:5px;white-space:nowrap;padding-bottom:10px;}
  .step-item.active .step-label{color:var(--accent);font-weight:500;}
  .main{max-width:580px;margin:0 auto;padding:28px 20px 80px;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn .3s ease;}
  .page-heading{font-size:21px;font-weight:500;margin-bottom:6px;}
  .page-desc{font-size:13px;color:var(--muted);margin-bottom:26px;line-height:1.8;}
  .section-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:500;margin-bottom:16px;letter-spacing:.05em;}
  .section-badge.flower{background:var(--flower-light);color:var(--flower);border:1px solid var(--flower-border);}
  .section-badge.hair-f{background:#FBEAF0;color:#993556;border:1px solid #ED93B1;}
  .section-badge.hair-m{background:#E6F1FB;color:#185FA5;border:1px solid #85B7EB;}
  .section-badge.outfit{background:var(--prop-light);color:var(--prop);border:1px solid var(--prop-border);}
  .notice-box{background:var(--accent-light);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:12px 14px;font-size:12px;line-height:1.8;margin-bottom:24px;}
  .notice-box strong{color:var(--accent);font-weight:500;}
  .notice-box.flower-n{background:var(--flower-light);border-left-color:var(--flower);}
  .notice-box.flower-n strong{color:var(--flower);}
  .notice-box.green{background:#EAF3DE;border-left-color:#3B6D11;}
  .notice-box.green strong{color:#3B6D11;}
  .field{margin-bottom:22px;}
  .field label{display:block;font-size:13px;font-weight:500;margin-bottom:8px;}
  .req{color:var(--accent);margin-left:4px;font-size:10px;}
  .opt{color:var(--muted);margin-left:4px;font-size:10px;font-weight:300;}
  input[type=text],input[type=date],textarea{width:100%;background:var(--warm-white);border:1px solid var(--border);border-radius:8px;padding:11px 13px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:300;color:var(--dark);outline:none;transition:border-color .2s;}
  input[type=text]:focus,input[type=date]:focus,textarea:focus{border-color:var(--accent);}
  textarea{resize:vertical;min-height:90px;line-height:1.7;}
  .radio-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
  .radio-grid.col1{grid-template-columns:1fr;}
  .radio-grid.col3{grid-template-columns:1fr 1fr 1fr;}
  .choice-card{position:relative;cursor:pointer;}
  .choice-card input{position:absolute;opacity:0;width:0;height:0;}
  .choice-label{display:flex;align-items:center;gap:9px;padding:11px 13px;background:var(--warm-white);border:1px solid var(--border);border-radius:8px;font-size:13px;transition:all .2s;cursor:pointer;line-height:1.4;}
  .choice-card input:checked+.choice-label{border-color:var(--accent);background:var(--accent-light);}
  .choice-dot{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;transition:all .2s;display:flex;align-items:center;justify-content:center;}
  .choice-card input:checked+.choice-label .choice-dot{border-color:var(--accent);background:var(--accent);}
  .choice-card input:checked+.choice-label .choice-dot::after{content:'';width:5px;height:5px;border-radius:50%;background:white;}
  /* category tabs */
  .cat-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .cat-tab{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--warm-white);font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s;}
  .cat-tab.active{border-color:var(--prop);background:var(--prop-light);color:var(--prop);}
  /* outfit grid */
  .outfit-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .outfit-card{position:relative;cursor:pointer;border-radius:10px;overflow:hidden;border:2px solid var(--border);transition:all .2s;}
  .outfit-card.selected{border-color:var(--prop);box-shadow:0 0 0 2px var(--prop-light);}
  .outfit-img-wrap{aspect-ratio:3/4;background:#f0f0ec;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .outfit-img-wrap img{width:100%;height:100%;object-fit:cover;}
  /* Slider fixes for mobile */
  .outfit-slider{position:relative;overflow:hidden;aspect-ratio:3/4;background:#f0f0ec;width:100%;}
  .outfit-slides{display:flex;height:100%;transition:transform .3s ease;will-change:transform;}
  .outfit-slide{min-width:100%;width:100%;height:100%;flex-shrink:0;overflow:hidden;}
  .outfit-slide img{width:100%;height:100%;object-fit:cover;display:block;}
  .outfit-label-text{padding:6px 8px;font-size:11px;color:var(--dark);background:var(--warm-white);text-align:center;line-height:1.4;word-break:break-all;}
  .outfit-check{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;border:2px solid white;background:transparent;display:flex;align-items:center;justify-content:center;font-size:11px;color:white;transition:all .2s;}
  .outfit-card.selected .outfit-check{background:var(--prop);border-color:var(--prop);}
  .outfit-count-badge{position:absolute;top:6px;left:6px;width:20px;height:20px;border-radius:50%;background:var(--prop);color:white;font-size:10px;font-weight:500;display:none;align-items:center;justify-content:center;}
  .outfit-card.selected .outfit-count-badge{display:flex;}
  /* upload */
  .upload-area{border:1.5px dashed var(--border);border-radius:10px;padding:20px 16px;text-align:center;background:var(--warm-white);cursor:pointer;transition:all .2s;position:relative;}
  .upload-area:hover{border-color:var(--accent);background:var(--accent-light);}
  .upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .upload-icon{font-size:22px;margin-bottom:6px;opacity:.5;}
  .upload-text{font-size:12px;color:var(--muted);line-height:1.7;}
  .upload-text strong{color:var(--accent);font-weight:500;}
  .photo-previews{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
  .photo-thumb{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;border:1px solid var(--border);}
  .photo-thumb img{width:100%;height:100%;object-fit:cover;}
  .photo-remove{position:absolute;top:4px;right:4px;width:20px;height:20px;background:rgba(0,0,0,.5);border-radius:50%;border:none;color:white;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  /* nav */
  .nav{display:flex;gap:10px;margin-top:32px;}
  .btn-back{flex:0 0 auto;padding:13px 18px;background:transparent;border:1px solid var(--border);border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;transition:all .2s;}
  .btn-back:hover{border-color:var(--muted);color:var(--dark);}
  .btn-next{flex:1;padding:13px;background:var(--dark);border:none;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:500;color:white;cursor:pointer;transition:all .2s;}
  .btn-next:hover{background:var(--accent);}
  .btn-submit{flex:1;padding:13px;background:var(--accent);border:none;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:500;color:white;cursor:pointer;transition:all .2s;}
  .btn-submit:hover{background:#B8845A;}
  .btn-submit:disabled{background:var(--muted);cursor:not-allowed;}
  /* confirm */
  .confirm-block{background:var(--warm-white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;}
  .confirm-block-title{background:var(--accent-light);padding:9px 15px;font-size:11px;font-weight:500;color:var(--accent);letter-spacing:.08em;border-bottom:1px solid var(--border);}
  .confirm-block-title.flower{background:var(--flower-light);color:var(--flower);}
  .confirm-block-title.male{background:#E6F1FB;color:#185FA5;}
  .confirm-block-title.outfit{background:var(--prop-light);color:var(--prop);}
  .confirm-row{padding:10px 15px;display:flex;gap:12px;border-bottom:1px solid var(--border);font-size:13px;}
  .confirm-row:last-child{border-bottom:none;}
  .confirm-key{color:var(--muted);flex:0 0 130px;font-size:12px;}
  .confirm-val{color:var(--dark);flex:1;line-height:1.6;}
  /* selected outfits preview */
  .selected-outfits{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .selected-outfit-chip{display:flex;align-items:center;gap:6px;background:var(--prop-light);border:1px solid var(--prop-border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--prop);}
  /* section done */
  .section-done-card{background:var(--warm-white);border:1px solid #8DC86A;border-radius:12px;padding:16px 18px;margin-bottom:14px;display:flex;align-items:flex-start;gap:12px;}
  .section-done-icon{width:36px;height:36px;border-radius:50%;background:#EAF3DE;border:1.5px solid #8DC86A;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .section-done-title{font-size:14px;font-weight:500;color:var(--dark);margin-bottom:3px;}
  .section-done-sub{font-size:12px;color:var(--muted);}
  /* thankyou */
  .thankyou{text-align:center;padding:48px 20px;}
  .thankyou-icon{width:60px;height:60px;border-radius:50%;background:var(--accent-light);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:22px;}
  .thankyou h2{font-size:21px;font-weight:500;margin-bottom:12px;}
  .thankyou p{font-size:13px;color:var(--muted);line-height:2;}
  /* sending */
  .sending-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
  .sending-overlay.show{display:flex;}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .sending-text{font-size:13px;color:var(--muted);}
  .error-msg{font-size:12px;color:var(--error);margin-top:6px;display:none;}
  .error-msg.show{display:block;}
  .resume-banner{background:#EAF3DE;border:1px solid #8DC86A;border-radius:10px;padding:12px 16px;font-size:13px;color:#2A5A18;margin-bottom:18px;line-height:1.7;}
  /* loading skeleton */
  .skeleton{background:linear-gradient(90deg,#f0ebe4 25%,#faf7f2 50%,#f0ebe4 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  /* ADMIN */
  .admin-wrap{max-width:740px;margin:0 auto;padding:24px 20px 60px;}
  .loading-box{text-align:center;padding:60px 0;color:var(--muted);font-size:14px;}
  .dashboard{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px;}
  .dash-card{background:var(--warm-white);border:1px solid var(--border);border-radius:14px;padding:24px 20px;cursor:pointer;transition:all .2s;}
  .dash-card:hover{border-color:var(--accent);transform:translateY(-2px);}
  .dash-card.new{border-left:4px solid var(--accent);}
  .dash-card.done{border-left:4px solid var(--border);}
  .dash-count{font-size:42px;font-weight:500;line-height:1;margin-bottom:8px;}
  .dash-card.new .dash-count{color:var(--accent);}
  .dash-card.done .dash-count{color:var(--muted);}
  .dash-label{font-size:14px;font-weight:500;margin-bottom:4px;}
  .dash-sub{font-size:11px;color:var(--muted);}
  .list-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
  .btn-back-list{padding:8px 14px;background:transparent;border:1px solid var(--border);border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:12px;color:var(--muted);cursor:pointer;}
  .list-title{font-size:16px;font-weight:500;}
  .admin-card{background:var(--warm-white);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;}
  .admin-card-head{background:var(--accent-light);padding:13px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
  .admin-card-name{font-size:16px;font-weight:500;}
  .admin-card-meta{font-size:11px;color:var(--muted);}
  .admin-card-body{padding:16px 18px;}
  .admin-sec-title{font-size:11px;font-weight:500;letter-spacing:.06em;margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
  .admin-sec-title.flower{color:var(--flower);}
  .admin-sec-title.female{color:#993556;}
  .admin-sec-title.male{color:#185FA5;}
  .admin-sec-title.outfit{color:var(--prop);}
  .admin-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 20px;font-size:13px;margin-bottom:10px;}
  .admin-fl{font-size:11px;color:var(--muted);margin-bottom:2px;}
  .photo-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .photo-thumb-sm{width:72px;height:72px;border-radius:6px;overflow:hidden;border:1px solid var(--border);cursor:pointer;flex-shrink:0;}
  .photo-thumb-sm img{width:100%;height:100%;object-fit:cover;}
  .sec-status{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:10px;margin-left:6px;}
  .sec-status.ok{background:#EAF3DE;color:#3B6D11;border:1px solid #8DC86A;}
  .sec-status.ng{background:#FEF3E2;color:#A05C00;border:1px solid #F5C26B;}
  .badge-new{display:inline-block;background:var(--accent);color:white;font-size:10px;padding:2px 8px;border-radius:10px;margin-left:8px;vertical-align:middle;}
  .create-customer-wrap{background:var(--warm-white);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:24px;}
  .create-customer-title{font-size:13px;font-weight:500;margin-bottom:12px;}
  .create-customer-form{display:flex;gap:8px;}
  .create-customer-form input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;}
  .create-customer-form input:focus{border-color:var(--accent);}
  .btn-create{padding:10px 18px;background:var(--dark);border:none;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:white;cursor:pointer;white-space:nowrap;}
  .btn-create:hover{background:var(--accent);}
  .created-url-box{margin-top:12px;display:none;}
  .created-url-box.show{display:block;}
  .share-row{display:flex;gap:8px;align-items:center;}
  .share-url-text{font-size:11px;color:var(--muted);background:var(--cream);border:1px solid var(--border);border-radius:6px;padding:7px 10px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .btn-copy{padding:7px 14px;background:var(--dark);border:none;border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:11px;color:white;cursor:pointer;white-space:nowrap;}
  .btn-copy:hover{background:var(--accent);}
  .btn-copy.copied{background:var(--success);}
  .section-urls{margin-top:14px;background:var(--cream);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
  .section-urls-title{font-size:11px;font-weight:500;color:var(--muted);margin-bottom:10px;}
  .section-url-row{margin-bottom:10px;}
  .section-url-row:last-child{margin-bottom:0;}
  .section-url-label{font-size:11px;color:var(--dark);font-weight:500;margin-bottom:4px;}
  /* salon */
  .salon-wrap-inner{max-width:620px;margin:0 auto;padding:24px 20px 60px;}
  .salon-card{background:var(--warm-white);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  .salon-head{background:var(--accent-light);padding:18px 20px;border-bottom:1px solid var(--border);}
  .salon-name{font-size:20px;font-weight:500;margin-bottom:4px;}
  .salon-meta{font-size:12px;color:var(--muted);}
  .salon-body{padding:20px;}
  .salon-section{margin-bottom:22px;}
  .salon-sec-title{font-size:11px;font-weight:500;letter-spacing:.08em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
  .salon-sec-title.flower{color:var(--flower);}
  .salon-sec-title.female{color:#993556;}
  .salon-sec-title.male{color:#185FA5;}
  .salon-sec-title.outfit{color:var(--prop);}
  .salon-sec-title.common{color:var(--accent);}
  .salon-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px;}
  .salon-fl{color:var(--muted);font-size:11px;margin-bottom:3px;}
  .salon-fv{font-size:13px;}
  .salon-photos{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .salon-photo{aspect-ratio:1;border-radius:8px;overflow:hidden;border:1px solid var(--border);cursor:pointer;}
  .salon-photo img{width:100%;height:100%;object-fit:cover;}
  .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;}
  .lightbox.open{display:flex;}
  .lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;}
  .lightbox-close{position:absolute;top:16px;right:20px;font-size:28px;color:white;cursor:pointer;}
  .alert-banner{background:#FDECEA;border:1px solid #E8A0A0;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--error);}
  .alert-banner-title{font-weight:500;margin-bottom:6px;}
  .alert-item{font-size:12px;padding:3px 0;}
  .create-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
  .create-field label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px;}
  .create-field input,.create-field select{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;}
  .create-field input:focus,.create-field select:focus{border-color:var(--accent);}
  .action-btns{display:flex;gap:8px;margin-top:14px;}
  .btn-complete{flex:1;padding:10px;background:var(--success);border:none;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;color:white;cursor:pointer;}
  .btn-complete:hover{background:#4A7A5A;}
  .btn-delete{padding:10px 16px;background:transparent;border:1px solid var(--error);border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--error);cursor:pointer;}
  .btn-delete:hover{background:#FDECEA;}
  .badge-urgent{display:inline-block;background:var(--error);color:white;font-size:10px;padding:2px 8px;border-radius:10px;margin-left:8px;vertical-align:middle;}
  .admin-card.urgent{border-color:var(--error);box-shadow:0 0 0 2px rgba(196,106,106,.15);}
  .admin-card.urgent .admin-card-head{background:#FDECEA;}
  .copied-badge{font-size:10px;background:#EAF3DE;color:#3B6D11;border:1px solid #8DC86A;padding:1px 7px;border-radius:10px;}
  .btn-copy.was-copied{background:#888;}
  .section-url-label{font-size:11px;color:var(--dark);font-weight:500;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
  .dash-card.pending{border-left:4px solid var(--accent);}

  /* ADMIN TABS */
  .admin-tabs{display:flex;background:var(--warm-white);border-bottom:1px solid var(--border);padding:0 20px;}
  .admin-tab{padding:12px 20px;background:transparent;border:none;border-bottom:3px solid transparent;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s;margin-bottom:-1px;}
  .admin-tab:hover{color:var(--dark);}
  .admin-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  /* UPLOAD TAB */
  .upload-tab-wrap{max-width:740px;margin:0 auto;padding:24px 20px 60px;}
  .upload-item{background:var(--warm-white);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
  .upload-item-head{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);}
  .upload-item-thumb{width:60px;height:60px;border-radius:8px;overflow:hidden;border:1px solid var(--border);flex-shrink:0;background:#f0ebe4;}
  .upload-item-thumb img{width:100%;height:100%;object-fit:cover;}
  .upload-item-body{padding:14px 16px;}
  .upload-item-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
  .upload-item-field label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px;}
  .upload-item-field input,.upload-item-field select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;}
  .upload-item-field input:focus,.upload-item-field select:focus{border-color:var(--accent);}
  .upload-item-url{display:flex;gap:8px;align-items:center;margin-top:8px;}
  .upload-item-url input{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:11px;color:var(--muted);background:var(--cream);outline:none;}
  .status-badge{font-size:11px;padding:3px 10px;border-radius:10px;white-space:nowrap;}
  .status-badge.uploading{background:#FEF3E2;color:#A05C00;border:1px solid #F5C26B;}
  .status-badge.done{background:#EAF3DE;color:#3B6D11;border:1px solid #8DC86A;}
  .status-badge.error{background:#FDECEA;color:var(--error);border:1px solid #E8A0A0;}
  .drop-zone{border:2px dashed var(--border);border-radius:12px;padding:32px 20px;text-align:center;background:var(--warm-white);cursor:pointer;transition:all .2s;position:relative;margin-bottom:16px;}
  .drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:var(--accent-light);}
  .drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .drop-zone-icon{font-size:32px;margin-bottom:10px;opacity:.5;}
  .drop-zone-text{font-size:13px;color:var(--muted);line-height:1.8;}
  .drop-zone-text strong{color:var(--accent);}
  .btn-register{padding:10px 20px;background:var(--success);border:none;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;color:white;cursor:pointer;transition:all .2s;}
  .btn-register:hover{background:#4A7A5A;}
  .btn-register:disabled{background:var(--muted);cursor:not-allowed;}
  .register-result{margin-top:12px;font-size:12px;padding:10px 14px;border-radius:8px;display:none;}
  .register-result.show{display:block;}
  .register-result.ok{background:#EAF3DE;color:#3B6D11;border:1px solid #8DC86A;}
  .register-result.err{background:#FDECEA;color:var(--error);border:1px solid #E8A0A0;}

  /* RICH TEXT EDITOR */
  .rte-toolbar{display:flex;align-items:center;gap:4px;padding:8px 10px;background:var(--cream);border:1px solid var(--border);border-radius:8px 8px 0 0;flex-wrap:wrap;}
  .rte-toolbar button{padding:4px 10px;background:var(--warm-white);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:13px;transition:all .2s;}
  .rte-toolbar button:hover{background:var(--accent-light);border-color:var(--accent);}
  .rte-editor{min-height:120px;padding:12px 14px;border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;background:var(--warm-white);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:300;line-height:1.8;outline:none;}
  .rte-editor:focus{border-color:var(--accent);}
  .option-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:20px;}
  .option-modal.open{display:flex;}
  .option-modal-inner{background:var(--warm-white);border-radius:14px;padding:24px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;}
  .option-modal-title{font-size:16px;font-weight:500;margin-bottom:14px;}
  .option-modal-body{font-size:13px;line-height:1.8;color:var(--dark);}
  .option-modal-close{margin-top:20px;width:100%;padding:11px;background:var(--dark);border:none;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:white;cursor:pointer;}
  @media(max-width:400px){
    .outfit-grid{gap:7px;}
    .outfit-label-text{font-size:10px;padding:5px 6px;}
    .slider-btn{width:22px;height:22px;font-size:11px;}
  }
  /* OUTFIT SLIDER */
  .outfit-slider{position:relative;overflow:hidden;aspect-ratio:3/4;background:#f0f0ec;}
  .outfit-slides{display:flex;transition:transform .3s ease;height:100%;}
  .outfit-slide{min-width:100%;height:100%;flex-shrink:0;}
  .outfit-slide img{width:100%;height:100%;object-fit:cover;}
  .slider-btn{position:absolute;top:50%;transform:translateY(-50%);width:26px;height:26px;background:rgba(255,255,255,.85);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;z-index:2;box-shadow:0 1px 4px rgba(0,0,0,.2);}
  .slider-btn.prev{left:4px;}
  .slider-btn.next{right:4px;}
  .slider-dots{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);display:flex;gap:3px;}
  .slider-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.6);}
  .slider-dot.active{background:white;}
</style>
</head>
<body>
<div class="sending-overlay" id="sending-overlay">
  <div class="spinner"></div>
  <div class="sending-text" id="sending-text">送信中です…</div>
</div>
<div id="client-app">
  <div class="header">
    <div class="header-title">iliy 事前アンケート</div>
    <div class="header-sub" id="client-header-sub">撮影日の7日前までにご回答ください</div>
  </div>
  <div class="progress-wrap"><div class="progress-steps" id="progress-steps"></div></div>
  <div class="main" id="form-main"></div>
</div>
<div id="admin-app" style="display:none">
  <div class="header">
    <div class="header-title">管理画面</div>
    <div class="header-sub" id="admin-sub">読み込み中…</div>
    <button onclick="reloadAdmin()" style="position:absolute;right:16px;top:50%;transform:translateY(-50%);padding:6px 14px;background:transparent;border:1px solid var(--border);border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:11px;color:var(--muted);cursor:pointer;">🔄 更新</button>
  </div>
  <div class="admin-tabs">
    <button class="admin-tab active" id="tab-customers" onclick="switchAdminTab('customers')">📋 回答一覧</button>
    <button class="admin-tab" id="tab-upload" onclick="switchAdminTab('upload')">📷 衣装画像</button>
    <button class="admin-tab" id="tab-settings" onclick="switchAdminTab('settings')">⚙️ 設定</button>
  </div>
  <div id="admin-tab-customers">
    <div class="admin-wrap" id="admin-wrap"><div class="loading-box">読み込み中…</div></div>
  </div>
  <div id="admin-tab-settings" style="display:none">
    <div class="upload-tab-wrap" id="settings-wrap">
      <div class="page-heading" style="margin-bottom:6px">テキスト設定</div>
      <div class="page-desc">お客様画面に表示される文章を編集できます。編集後「保存」を押してください。</div>
      <div id="settings-fields"><div class="loading-box">読み込み中…</div></div>
    </div>
  </div>
  <div id="admin-tab-upload" style="display:none">
    <div class="upload-tab-wrap" id="upload-wrap">
      <div class="page-heading" style="margin-bottom:6px">衣装画像のアップロード</div>
      <div class="page-desc">画像をアップロードしてoutfitsシートに登録します。</div>
      <div class="drop-zone" id="drop-zone">
        <input type="file" accept="image/*" multiple onchange="handleUploadFiles(event)">
        <div class="drop-zone-icon">📷</div>
        <div class="drop-zone-text"><strong>タップして写真を選ぶ</strong><br>または画像をここにドロップ<br>複数枚まとめてOK</div>
      </div>
      <div id="upload-items"></div>
    </div>
  </div>
</div>
<div id="salon-app" style="display:none">
  <div class="header">
    <div class="header-title" id="salon-header-title">担当者様へ</div>
    <div class="header-sub">事前アンケート</div>
  </div>
  <div class="salon-wrap-inner" id="salon-wrap"><div class="loading-box">読み込み中…</div></div>
</div>
<div class="option-modal" id="option-modal" onclick="if(event.target===this)closeOptionDetail()">
  <div class="option-modal-inner">
    <div class="option-modal-title" id="option-modal-title"></div>
    <div class="option-modal-body" id="option-modal-body"></div>
    <button class="option-modal-close" onclick="closeOptionDetail()">閉じる</button>
  </div>
</div>
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close" onclick="closeLightbox()">✕</span>
  <img id="lightbox-img" src="" onclick="event.stopPropagation()">
  <button id="lb-prev" onclick="event.stopPropagation();lbSlide(-1)" style="display:none;position:absolute;left:16px;top:50%;transform:translateY(-50%);width:40px;height:40px;background:rgba(255,255,255,.2);border:none;border-radius:50%;color:white;font-size:22px;cursor:pointer;">‹</button>
  <button id="lb-next" onclick="event.stopPropagation();lbSlide(1)" style="display:none;position:absolute;right:16px;top:50%;transform:translateY(-50%);width:40px;height:40px;background:rgba(255,255,255,.2);border:none;border-radius:50%;color:white;font-size:22px;cursor:pointer;">›</button>
  <div id="lb-dots" style="position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:6px;"></div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbwHeyyigTzret7QPqlc5lNN_YUvRtJLNBVgLAoT8D2TL1gGaq1oGsn2P2MsFAqz2w_B6A/exec';
const CATEGORIES=['80cm','90cm','100cm','マタニティ'];

async function apiPost(b){const r=await fetch(API,{method:'POST',body:JSON.stringify(b)});return r.json();}
async function apiGet(p){const r=await fetch(API+'?'+new URLSearchParams(p));return r.json();}
// 管理者用（パスワード自動付与）
let adminPassword='';
async function adminPost(b){return apiPost({...b,adminPass:adminPassword});}
async function adminGet(p){const r=await fetch(API+'?'+new URLSearchParams({...p,adminPass:adminPassword}));return r.json();}

// photo store
const PS={'fl-person':[],'fl-outfit':[],'fh-hair':[],'fh-makeup':[],'fh-length':[],'mh-hair':[],'mh-length':[]};

// outfit data (loaded from GAS)
let OUTFITS=[];
let outfitLoaded=false;
let SETTINGS={};
let settingsLoaded=false;

async function loadOutfits(){
  if(outfitLoaded)return;
  try{
    const r=await apiGet({action:'getOutfits'});
    if(r.ok)OUTFITS=r.data;
  }catch(e){}
  outfitLoaded=true;
}

async function loadSettings(){
  if(settingsLoaded)return;
  try{
    const r=await apiGet({action:'getSettings'});
    if(r.ok){
      SETTINGS=r.data;
      console.log('Settings loaded. hair_notice:', (SETTINGS.hair_notice||'').substring(0,80));
    }
  }catch(e){}
  settingsLoaded=true;
}

// routing
const UP=new URLSearchParams(location.search);
const pMode=UP.get('mode'),cid=UP.get('cid'),salonId=UP.get('sid'),salonSec=UP.get('section');

if(salonId){
  document.getElementById('client-app').style.display='none';
  document.getElementById('salon-app').style.display='block';
  initSalon(salonId,salonSec);
}else if(pMode==='admin'){
  document.getElementById('client-app').style.display='none';
  document.getElementById('admin-app').style.display='block';
  initAdmin();
}else if(cid){
  initClient(cid);
}else{
  document.getElementById('form-main').innerHTML='<div style="text-align:center;padding:60px 0;font-size:14px;color:var(--muted)">スタジオからお送りした専用URLよりアクセスしてください。</div>';
}

// ══ CLIENT ══
let customer=null,sectionStatus={},sectionsToFill=[],currentSection='',currentStep=0;
let commonData={},flowerData={},hairFormData={},outfitData={selected:[],memo:''};
let hairOptionType='',selectedCategory='';

async function initClient(id){
  document.getElementById('client-header-sub').textContent='読み込み中…';
  try{
    // getCustomer・settings・outfitsを並列取得
    const[r]=await Promise.all([
      apiGet({action:'getCustomer',cid:id}),
      loadSettings(),
      loadOutfits()
    ]);
    if(!r.ok)throw new Error(r.error);
    customer=r.data;sectionStatus=customer.sectionSentStatus||{};
    document.getElementById('client-header-sub').textContent=customer.name+' 様の事前アンケート';
    renderCommon();
  }catch(e){
    document.getElementById('form-main').innerHTML='<div style="text-align:center;padding:60px 0;color:var(--muted);font-size:14px">URLが無効か読み込みに失敗しました。</div>';
  }
}

async function renderSelector(){
  if(!settingsLoaded)await loadSettings();
  // 前回の選択を復元するためのデフォルト値を取得
  const prevFlower=customer.flowerOption&&customer.flowerOption!=='none'?'花束を注文している':(customer.flowerOption==='none'&&(customer.sectionSentStatus?.flower||customer.sectionSentStatus?.hair||customer.sectionSentStatus?.outfitChosen))?'花束を注文していない':'';
  const prevHair=customer.hairOption==='female'?'女性ヘアセット＆メイク':customer.hairOption==='male'?'男性ヘアセット':customer.hairOption==='both'?'両方（女性＋男性）':(customer.hairOption==='none'&&(customer.sectionSentStatus?.flower||customer.sectionSentStatus?.outfit||customer.sectionSentStatus?.outfitChosen))?'ヘアメイクなし':'';
  const prevOutfit=customer.sectionSentStatus?.outfitChosen?'衣装レンタルを利用する':customer.sectionSentStatus?.outfitNotNeeded?'衣装レンタルは利用しない':'';
  updateProgressEmpty();
  const m=document.getElementById('form-main');
  m.innerHTML=`<div class="fade-in">
    <div class="page-heading">オプションの選択</div>
    <div class="page-desc">ご予約のオプションをすべて選択してください。</div>
    <div class="field">
      <label>花束オプション<span class="req">必須</span>${SETTINGS.flower_detail?`<button type="button" onclick="showOptionDetail('flower')" style="margin-left:8px;padding:2px 10px;background:var(--flower-light);border:1px solid var(--flower-border);border-radius:10px;font-family:'Noto Sans JP',sans-serif;font-size:10px;color:var(--flower);cursor:pointer;">詳細を見る</button>`:''}
      </label>
      ${rg('has-flower',['花束を注文している','花束を注文していない'],'col1',sectionStatus.flower,prevFlower)}
      <div class="error-msg" id="err-flower">選択してください</div>
    </div>
    <div class="field">
      <label>ヘアメイクオプション<span class="req">必須</span>${SETTINGS.hair_detail?`<button type="button" onclick="showOptionDetail('hair')" style="margin-left:8px;padding:2px 10px;background:#FBEAF0;border:1px solid #ED93B1;border-radius:10px;font-family:'Noto Sans JP',sans-serif;font-size:10px;color:#993556;cursor:pointer;">詳細を見る</button>`:''}
      </label>
      ${rg('has-hair',['女性ヘアセット＆メイク','男性ヘアセット','両方（女性＋男性）','ヘアメイクなし'],'col1',sectionStatus.hair,prevHair)}
      <div class="error-msg" id="err-hair">選択してください</div>
    </div>
    <div class="field">
      <label>衣装レンタルオプション<span class="req">必須</span>${SETTINGS.outfit_detail?`<button type="button" onclick="showOptionDetail('outfit')" style="margin-left:8px;padding:2px 10px;background:var(--prop-light);border:1px solid var(--prop-border);border-radius:10px;font-family:'Noto Sans JP',sans-serif;font-size:10px;color:var(--prop);cursor:pointer;">詳細を見る</button>`:''}
      </label>
      ${rg('has-outfit',['衣装レンタルを利用する','衣装レンタルは利用しない'],'col1',sectionStatus.outfit,prevOutfit)}
      <div class="error-msg" id="err-outfit">選択してください</div>
    </div>
    <div class="nav"><button class="btn-back" onclick="renderCommon()">← 戻る</button><button class="btn-next" onclick="startSections()">次へ　→</button></div>
  </div>`;
}

function rg(name,opts,col,locked,prevVal){
  const note=locked?'<span style="color:var(--success);font-size:11px;margin-left:6px">✓ 送信済み</span>':'';
  return note+`<div class="radio-grid ${col||''}" style="${locked?'opacity:.5;pointer-events:none;':''}">`+
    opts.map(o=>`<label class="choice-card"><input type="radio" name="${name}" value="${o}"${locked?' disabled':''}${!locked&&prevVal===o?' checked':''}><div class="choice-label"><div class="choice-dot"></div>${o}</div></label>`).join('')+'</div>';
}

async function startSections(){
  const flower=document.querySelector('input[name="has-flower"]:checked')?.value;
  const hair=document.querySelector('input[name="has-hair"]:checked')?.value;
  const outfit=document.querySelector('input[name="has-outfit"]:checked')?.value;
  let ok=true;
  const show=id=>{const e=document.getElementById(id);if(e){e.classList.add('show');ok=false;}};
  const hide=id=>{const e=document.getElementById(id);if(e)e.classList.remove('show');};
  if(!flower&&!sectionStatus.flower)show('err-flower');else hide('err-flower');
  if(!hair&&!sectionStatus.hair)show('err-hair');else hide('err-hair');
  if(!outfit&&!sectionStatus.outfit)show('err-outfit');else hide('err-outfit');
  if(!ok)return;
  // オプション内容をGASのcustomersシートに保存
  const flowerOpt=flower==='花束を注文している'?'flower':'none';
  const hairOpt=hair==='女性ヘアセット＆メイク'?'female':hair==='男性ヘアセット'?'male':hair==='両方（女性＋男性）'?'both':'none';
  const outfitOpt=outfit==='衣装レンタルを利用する'?'outfit':'none';
  try{
    await apiPost({action:'updateOptions',cid,flowerOption:flowerOpt,hairOption:hairOpt,outfitOption:outfitOpt});
    customer.flowerOption=flowerOpt;
    customer.hairOption=hairOpt;
    customer.outfitOption=outfitOpt;
  }catch(e){console.warn('updateOptions failed:',e);}

  sectionsToFill=[];
  if(flower==='花束を注文している'&&!sectionStatus.flower)sectionsToFill.push('flower');
  if(hair&&hair!=='ヘアメイクなし'&&!sectionStatus.hair){
    sectionsToFill.push('hair');
    hairOptionType=hair==='女性ヘアセット＆メイク'?'female':hair==='男性ヘアセット'?'male':'both';
  }
  if(outfit==='衣装レンタルを利用する'&&!sectionStatus.outfit)sectionsToFill.push('outfit');
  if(sectionsToFill.length===0){
    // 全て不要→GASに専用の全対象外アクションを送信
    try{ await apiPost({action:'markAllNotNeeded',cid}); }catch(e){}
    document.getElementById('form-main').innerHTML=`<div class="thankyou"><div class="thankyou-icon">✓</div><h2>ご回答ありがとうございます</h2><p>今回はオプションのご利用はないことを確認しました。<br><br>当日お会いできるのを楽しみにしております。</p></div>`;
    return;
  }
  currentSection=sectionsToFill[0];currentStep=0;renderCurrentSection();
}

// ── 共通情報（最初に表示）──
function renderCommon(){
  updateProgressEmpty();
  // 全セクション完了チェック（お客様が選んだオプションに基づく）
  const needsFlower=customer.flowerOption&&customer.flowerOption!=='none';
  const needsHair=customer.hairOption&&customer.hairOption!=='none';
  const allDone=(!needsFlower||sectionStatus.flower)&&(!needsHair||sectionStatus.hair)&&sectionStatus.outfit;
  if(allDone&&(needsFlower||needsHair||sectionStatus.outfit)){
    document.getElementById('form-main').innerHTML=`<div class="thankyou"><div class="thankyou-icon">✓</div><h2>すべての回答が完了しています</h2><p>${(SETTINGS.complete_message||'ご回答ありがとうございます。<br>当日お会いできるのを楽しみにしております。')}</p></div>`;
    return;
  }
  const resume=(sectionStatus.flower||sectionStatus.hair||sectionStatus.outfit)?'<div class="resume-banner">✅ 一部の回答はすでに送信済みです。続きから回答できます。</div>':'';
  document.getElementById('form-main').innerHTML=`<div class="fade-in">
    ${resume}
    <div class="page-heading">${customer.name} 様</div>
    <div class="page-desc">ご予約内容をご確認ください。</div>
    <div class="field">
      <label>お名前</label>
      <div style="padding:11px 13px;background:var(--accent-light);border-radius:8px;font-size:14px;font-weight:500">${customer.name}</div>
    </div>
    <div class="field">
      <label>撮影日</label>
      <div style="padding:11px 13px;background:var(--accent-light);border-radius:8px;font-size:14px;font-weight:500">${fmtD(customer.shootDate)||'未設定'}</div>
    </div>
    <div class="nav"><button class="btn-next" onclick="goCommon()">次へ　→</button></div>
  </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function goCommon(){
  commonData.name=customer.name||'';
  commonData.shootDate=customer.shootDate||'';
  renderSelector();
}
function renderCurrentSection(){
  if(currentSection==='flower')renderFlower();
  else if(currentSection==='hair'){hairSteps=buildHairSteps();renderHair();}
  else if(currentSection==='outfit')renderOutfit();
}

// ── FLOWER ──
const flowerStepList=['fl-main','fl-photo','fl-confirm'];
async function renderFlower(){

function goFlower(){
  if(currentStep===0){
    flowerData.mood=document.querySelector('input[name="fl-mood"]:checked')?.value||flowerData.mood||'';
    flowerData.note=document.getElementById('fl-note')?.value||'';
    if(!flowerData.mood){document.getElementById('err-fl-mood')?.classList.add('show');return;}
    document.getElementById('err-fl-mood')?.classList.remove('show');
  }
  currentStep++;renderFlower();
}

  // both: 女性名前→女性アンケート→男性名前→男性アンケート

}

function goHair(){
  const s=hairSteps[currentStep];let ok=true;
  const show=id=>{const e=document.getElementById(id);if(e){e.classList.add('show');ok=false;}};
  const hide=id=>{const e=document.getElementById(id);if(e)e.classList.remove('show');};
  if(s==='h-f-name'){
    commonData.name=document.getElementById('h-name-female')?.value||commonData.name||'';
    if(!commonData.name){show('err-h-name-female');}else{hide('err-h-name-female');}
  }
  if(s==='h-m-name'){
    commonData.nameMale=document.getElementById('h-name-male')?.value||commonData.nameMale||'';
    if(!commonData.nameMale){show('err-h-name-male');}else{hide('err-h-name-male');}
  }
  if(s==='h-basic'&&hairOptionType==='both'){
    commonData.nameMale=document.getElementById('h-name-male')?.value||commonData.nameMale||'';
    if(!commonData.nameMale){show('err-h-name-male');}else{hide('err-h-name-male');}
  }
  if(s==='h-f-hair'){
    hairFormData.fHairLength=document.querySelector('input[name="f-hair-length"]:checked')?.value||hairFormData.fHairLength||'';
    hairFormData.fPerm=document.querySelector('input[name="f-perm"]:checked')?.value||hairFormData.fPerm||'';
    hairFormData.fHairVolume=document.querySelector('input[name="f-hair-volume"]:checked')?.value||hairFormData.fHairVolume||'';
    hairFormData.fHairTexture=document.querySelector('input[name="f-hair-texture"]:checked')?.value||hairFormData.fHairTexture||'';
    if(!hairFormData.fHairLength)show('err-f-length');else hide('err-f-length');
    if(!hairFormData.fPerm)show('err-f-perm');else hide('err-f-perm');
    if(!hairFormData.fHairVolume)show('err-f-volume');else hide('err-f-volume');
    if(!hairFormData.fHairTexture)show('err-f-texture');else hide('err-f-texture');
  }
  if(s==='h-f-makeup'){
    hairFormData.fSkinType=document.querySelector('input[name="f-skin-type"]:checked')?.value||hairFormData.fSkinType||'';
    hairFormData.fAllergyCosm=document.getElementById('f-allergy')?.value||hairFormData.fAllergyCosm||'';
    hairFormData.fContact=document.querySelector('input[name="f-contact"]:checked')?.value||hairFormData.fContact||'';
    hairFormData.fMakeupImage=document.querySelector('input[name="f-makeup-image"]:checked')?.value||hairFormData.fMakeupImage||'';
    if(!hairFormData.fSkinType)show('err-f-skin');else hide('err-f-skin');
    if(!hairFormData.fContact)show('err-f-contact');else hide('err-f-contact');
    if(!hairFormData.fMakeupImage)show('err-f-makeup');else hide('err-f-makeup');
  }
  if(s==='h-m-hair'){
    hairFormData.mHairLength=document.querySelector('input[name="m-hair-length"]:checked')?.value||hairFormData.mHairLength||'';
    hairFormData.mPerm=document.querySelector('input[name="m-perm"]:checked')?.value||hairFormData.mPerm||'';
    hairFormData.mHairVolume=document.querySelector('input[name="m-hair-volume"]:checked')?.value||hairFormData.mHairVolume||'';
    hairFormData.mHairTexture=document.querySelector('input[name="m-hair-texture"]:checked')?.value||hairFormData.mHairTexture||'';
    if(!hairFormData.mHairLength)show('err-m-length');else hide('err-m-length');
    if(!hairFormData.mPerm)show('err-m-perm');else hide('err-m-perm');
    if(!hairFormData.mHairVolume)show('err-m-volume');else hide('err-m-volume');
    if(!hairFormData.mHairTexture)show('err-m-texture');else hide('err-m-texture');
  }
  if(s==='h-m-photo')hairFormData.memo=document.getElementById('h-memo')?.value||hairFormData.memo||'';
  if(!ok)return;
  currentStep++;renderHair();
}

function renderOutfitContent(){
  selectedCategory=selectedCategory||CATEGORIES[0];
  const filtered=OUTFITS.filter(o=>o.category===selectedCategory);
  const selectedNames=outfitData.selected.map(id=>OUTFITS.find(o=>o.id===id)?.name).filter(Boolean);

  const m=document.getElementById('form-main');
  m.innerHTML=`<div class="fade-in">
    <div class="section-badge outfit">👗 衣装レンタル</div>
    <div class="page-heading">衣装の選択</div>
    ${SETTINGS.outfit_notice?`<div class="notice-box" style="margin-bottom:20px;${noticeStyle(SETTINGS.outfit_notice_color||'blue')}">${SETTINGS.outfit_notice}</div>`:''}

    <div class="field">
      <label>サイズカテゴリ</label>
      <div class="cat-tabs">
        ${CATEGORIES.map(c=>`<button class="cat-tab${selectedCategory===c?' active':''}" onclick="switchCategory('${c}')">${c}</button>`).join('')}

async function submitSection(section){
  const btn=document.getElementById('btn-submit');
  if(btn)btn.disabled=true;
  document.getElementById('sending-overlay').classList.add('show');
  try{
    // 画像を圧縮してからbase64に変換（最大1200px、JPEG品質0.75）
    const readFile=f=>new Promise(res=>{
      const img=new Image();
      const url=URL.createObjectURL(f);
      img.onload=()=>{
        const MAX=1200;
        let w=img.width,h=img.height;
        if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        URL.revokeObjectURL(url);
        res(canvas.toDataURL('image/jpeg',0.75));
      };
      img.onerror=()=>{
        // 圧縮失敗時は元ファイルをそのまま使う
        const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(f);
      };
      img.src=url;
    });
    const toB64=async key=>Promise.all(PS[key].map(readFile));
    let payload={action:'submitSection',section,cid,name:commonData.name,nameMale:commonData.nameMale,shootDate:commonData.shootDate,flowerOption:customer.flowerOption,hairOption:customer.hairOption};
    if(section==='flower'){
      const[pi,oi]=await Promise.all([toB64('fl-person'),toB64('fl-outfit')]);
      Object.assign(payload,{...flowerData,flowerPersonImages:pi,flowerOutfitImages:oi});
    }
    if(section==='hair'){
      const[fhi,fmi,fli,mhi,mli]=await Promise.all([toB64('fh-hair'),toB64('fh-makeup'),toB64('fh-length'),toB64('mh-hair'),toB64('mh-length')]);
      Object.assign(payload,{...hairFormData,hairOptionType,fHairImages:fhi,fMakeupImages:fmi,fLengthImages:fli,mHairImages:mhi,mLengthImages:mli});
    }
    if(section==='outfit'){
      const selectedNames=outfitData.selected.map((id,i)=>{const o=OUTFITS.find(x=>x.id===id);return o?o.name:''}).filter(Boolean);
      const outfitImgUrls=outfitData.selected.map(id=>{const o=OUTFITS.find(x=>x.id===id);return o&&o.img?o.img:null}).filter(Boolean);
      Object.assign(payload,{outfits:selectedNames,outfitImages:outfitImgUrls,memo:outfitData.memo});
    }
    const result=await apiPost(payload);
    document.getElementById('sending-overlay').classList.remove('show');
    if(result.ok){sectionStatus[section]=true;showSectionDone(section);}
    else{alert('送信に失敗しました。\n'+(result.error||''));if(btn)btn.disabled=false;}
  }catch(e){
    document.getElementById('sending-overlay').classList.remove('show');
    alert('通信エラーが発生しました。インターネット接続をご確認ください。');
    if(btn)btn.disabled=false;
  }
}

function isAllAnswered(c){
  const ss=c.sectionSentStatus||{};
  if(ss.allNotNeeded)return true;
  if(c.completed)return true;
  const needsFlower=c.flowerOption&&c.flowerOption!=='none';
  const needsHair=c.hairOption&&c.hairOption!=='none';
  return(!needsFlower||ss.flower)&&(!needsHair||ss.hair)&&ss.outfit;
}
function getAlertDays(){return parseInt(SETTINGS.alert_days||'7',10);}
function isUrgent(c){
  if(!c.shootDate||c.completed)return false;
  const days=getAlertDays();
  const shoot=new Date(c.shootDate);
  const now=new Date();
  const diff=Math.ceil((shoot-now)/(1000*60*60*24));
  // 回答済みでも対応済みでなければ警告（撮影日が迫っている場合）
  return diff<=days&&diff>=0;
}

function showAdminList(type){
  const baseItems=type==='pending'?allCustomers.filter(c=>!c.completed):allCustomers.filter(c=>c.completed);
  const title=type==='pending'?'要確認':'対応済み';

function renderAdminList(type,baseItems){
  // 絞り込み
  let items=[...baseItems];
  if(listFilter==='flower')items=items.filter(c=>c.sectionSentStatus?.flower);
  else if(listFilter==='hair')items=items.filter(c=>c.sectionSentStatus?.hair);
  else if(listFilter==='outfit')items=items.filter(c=>c.sectionSentStatus?.outfit);
  else if(listFilter==='unanswered')items=items.filter(c=>!isAllAnswered(c));
  // 並び替え
  if(listSort==='shootDate')items.sort((a,b)=>new Date(a.shootDate)-new Date(b.shootDate));
  else if(listSort==='createdAt')items.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const title=type==='pending'?'要確認':'対応済み';
  document.getElementById('admin-wrap').innerHTML=`

      <button class="btn-back-list" onclick="showAdminDash()">← トップへ</button>

      <select onchange="listSort=this.value;showAdminList('${type}')" style="padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:12px;background:var(--warm-white);cursor:pointer;">

        <option value="createdAt"${listSort==='createdAt'?' selected':''}>🕐 発行日が新しい順</option>
      </select>
      <select onchange="listFilter=this.value;showAdminList('${type}')" style="padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:12px;background:var(--warm-white);cursor:pointer;">
        <option value="all"${listFilter==='all'?' selected':''}>すべて</option>
        <option value="unanswered"${listFilter==='unanswered'?' selected':''}>未回答のみ</option>
        <option value="flower"${listFilter==='flower'?' selected':''}>🌷 花束回答済み</option>
        <option value="hair"${listFilter==='hair'?' selected':''}>💄 ヘアメイク回答済み</option>
        <option value="outfit"${listFilter==='outfit'?' selected':''}>👗 衣装回答済み</option>
      </select>

function buildAdminCard(c){
  const base=location.origin+location.pathname;
  const ss=c.sectionSentStatus||{};
  const copied=c.copiedSections||{};
  const urgent=isUrgent(c);
  const answered=isAllAnswered(c);
  const needsFlower=c.flowerOption&&c.flowerOption!=='none';
  const needsHair=c.hairOption&&c.hairOption!=='none';
  // お客様がまだオプション選択していない場合（sectionSentStatusが全て空）は全項目「未回答」
  const noAnswerYet=!ss.flower&&!ss.hair&&!ss.outfit&&!ss.outfitChosen&&!ss.outfitNotNeeded&&!ss.allNotNeeded;
  // 全オプション対象外（花束なし・ヘアメイクなし・衣装も不要）の場合はURL非表示
  const allNotNeeded=ss.allNotNeeded===true;
  const badge=allNotNeeded?'<span style="display:inline-block;background:#E8E0D5;color:#7A7570;font-size:10px;padding:2px 8px;border-radius:10px;margin-left:8px;">全対象外</span>':answered&&!c.completed?'<span class="badge-new">全回答済</span>':c.completed?'':!answered?'<span style="display:inline-block;background:#FEF3E2;color:#A05C00;border:1px solid #F5C26B;font-size:10px;padding:2px 8px;border-radius:10px;margin-left:8px;">回答待ち</span>':'';
  const urgentBadge=urgent?'<span class="badge-urgent">⚠️ 期限注意</span>':'';
  const secSt=(sec,label,needed)=>{
    // オプション未選択の場合は全部「未回答」表示
    if(!needed&&!noAnswerYet)return`<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><span style="font-size:12px;color:var(--muted)">${label}</span><span style="font-size:10px;color:var(--muted)">対象外</span></div>`;
    if(allNotNeeded&&!noAnswerYet)return`<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><span style="font-size:12px;color:var(--muted)">${label}</span><span style="font-size:10px;color:var(--muted)">対象外</span></div>`;
    return`<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><span style="font-size:12px">${label}</span><span class="sec-status ${ss[sec]?'ok':'ng'}">${ss[sec]?'回答済み':'未回答'}</span></div>`;
  };
  return`<div class="admin-card${urgent?' urgent':''}" id="card-${c.id}">
    <div class="admin-card-head">
      <div><span class="admin-card-name">${c.name} 様</span>${badge}${urgentBadge}</div>
      <div class="admin-card-meta">撮影日：${fmtD(c.shootDate)}　発行：${fmtDT(c.createdAt)}</div>
    </div>
    <div class="admin-card-body">
      <div style="margin-bottom:14px">
        ${secSt('flower','🌷 花束',needsFlower)}
        ${secSt('hair','💄 ヘアメイク',needsHair)}
        ${secSt('outfit','👗 衣装レンタル',noAnswerYet||ss.outfit||ss.outfitChosen)}
      </div>
      ${(!allNotNeeded&&(noAnswerYet||needsFlower||needsHair||ss.outfit))?`<div class="section-urls">
        <div class="section-urls-title">担当者への共有URL</div>
        ${(noAnswerYet?['flower','hair','outfit']:[needsFlower?'flower':null,needsHair?'hair':null,(ss.outfit||ss.outfitChosen)?'outfit':null].filter(Boolean)).map(sec=>{
          const lb={flower:'🌷 花束担当者',hair:'💄 ヘアメイク担当者',outfit:'👗 衣装担当者'};
          const url=`${base}?sid=${c.id}&section=${sec}`;
          const wasCopied=copied[sec];
          return`<div class="section-url-row">
            <div class="section-url-label">${lb[sec]}${wasCopied?'<span class="copied-badge">コピー済み</span>':''}${ss[sec]?'<span class="sec-status ok" style="margin-left:4px">回答済み</span>':''}</div>
            <div class="share-row"><span class="share-url-text">${url}</span>
              <button class="btn-copy${wasCopied?' was-copied':''}" onclick="copyUrlAndMark('${url}','${c.id}','${sec}',this)">${wasCopied?'再コピー':'コピー'}</button>
            </div></div>`;
        }).join('')}
      </div>`:''}
      <div style="margin-top:10px;background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:10px 12px;">
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px">お客様に送るURL</div>
        <div class="share-row"><span class="share-url-text">${base}?cid=${c.id}</span><button class="btn-copy" onclick="copyText('${base}?cid=${c.id}',this)">コピー</button></div>
      </div>
      <div style="margin-top:12px">
        <button id="det-btn-${c.id}" onclick="loadDetail('${c.id}')" style="width:100%;padding:10px;background:var(--cream);border:1px dashed var(--border);border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:12px;color:var(--muted);cursor:pointer;">📋 回答詳細を表示する</button>
        <div id="det-${c.id}"></div>
      </div>
      ${!c.completed?`<div class="action-btns">
        <button class="btn-complete" onclick="completeCustomer('${c.id}')">✓ 対応済みにする</button>
        <button class="btn-delete" onclick="deleteCustomer('${c.id}')">🗑 削除</button>
      </div>`:`<div class="action-btns"><button class="btn-delete" onclick="deleteCustomer('${c.id}')">🗑 削除</button></div>`}
    </div>
  </div>`;
}

async function resetSection(cid,section,btn){
  if(!confirm(`「${section==='flower'?'花束':section==='hair'?'ヘアメイク':'衣装'}」の回答をリセットしますか？\nお客様が再回答できるようになります。`))return;
  btn.disabled=true;btn.textContent='処理中…';
  try{
    const r=await adminPost({action:'resetSection',cid,section});
    if(r.ok){
      const cx=allCustomers.find(x=>x.id===cid);
      if(cx&&cx.sectionSentStatus)cx.sectionSentStatus[section]=false;
      alert('リセットしました。お客様に再回答URLを送ってください。');
      // カードを再描画
      showAdminList(cx?.completed?'done':'pending');
    }else{alert('リセットに失敗しました：'+(r.error||''));}
  }catch(e){alert('エラーが発生しました。');}
}
async function copyUrlAndMark(url,cid,section,btn){
  await navigator.clipboard.writeText(url);
  btn.textContent='コピー完了!';btn.classList.add('copied');
  setTimeout(()=>{btn.textContent='再コピー';btn.classList.remove('copied');btn.classList.add('was-copied');},2000);
  const cx=allCustomers.find(x=>x.id===cid);
  if(cx){if(!cx.copiedSections)cx.copiedSections={};cx.copiedSections[section]=true;}
  const label=btn.closest('.section-url-row')?.querySelector('.section-url-label');
  if(label&&!label.querySelector('.copied-badge')){const b=document.createElement('span');b.className='copied-badge';b.textContent='コピー済み';label.appendChild(b);}
  adminPost({action:'markUrlCopied',cid,section});
}
async function completeCustomer(id){
  if(!confirm('対応済みに移動しますか？'))return;
  try{
    const r=await adminPost({action:'markComplete',cid:id});
    if(r.ok){const cx=allCustomers.find(x=>x.id===id);if(cx)cx.completed=true;showAdminList('pending');}
  }catch(e){alert('エラーが発生しました。');}
}
async function deleteCustomer(id){
  if(!confirm('このお客様のデータを完全に削除しますか？\nこの操作は取り消せません。'))return;
  try{
    const r=await adminPost({action:'deleteCustomer',cid:id});
    if(r.ok){
      allCustomers=allCustomers.filter(x=>x.id!==id);
      const card=document.getElementById('card-'+id);
      if(card){
        card.style.opacity='0';card.style.transition='opacity .3s';
        setTimeout(()=>{
          card.remove();
          document.getElementById('admin-sub').textContent='全'+allCustomers.length+'件';
          if(!document.querySelector('.admin-card'))showAdminDash();
        },300);
      }else{showAdminDash();}
    }
  }catch(e){alert('削除に失敗しました。');}
}

function photoRow(label,imgs){
  if(!imgs||imgs.length===0)return'';
  // data-src で遅延読み込み、クリックで拡大
  return`<div style="font-size:11px;color:var(--muted);margin:8px 0 4px">${label}（${imgs.length}枚）</div>
    <div class="photo-row">${imgs.map(u=>`
      <div class="photo-thumb-sm" onclick="openLightbox('${u}')" style="cursor:pointer;position:relative;">
        <img data-src="${u}" src="" loading="lazy" referrerpolicy="no-referrer"
          style="width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .3s;"
          onerror="this.parentElement.innerHTML='<div style=\'width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);text-align:center;padding:4px;\'>読み込み失敗</div>'"
          onload="this.style.opacity=1">
      </div>`).join('')}</div>`;
}

// 遅延読み込み実行
function lazyLoadImages(container){
  const imgs=container?container.querySelectorAll('img[data-src]'):document.querySelectorAll('img[data-src]');
  if('IntersectionObserver' in window){
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(entry=>{
        if(entry.isIntersecting){
          const img=entry.target;
          img.src=img.dataset.src;
          obs.unobserve(img);
        }
      });
    },{rootMargin:'100px'});
    imgs.forEach(img=>obs.observe(img));
  }else{
    // フォールバック: 全部読み込む
    imgs.forEach(img=>{img.src=img.dataset.src;});
  }
}

function selectColor(colorKey, colorName, textKey) {
  // Update button UI
  Object.keys(COLOR_MAP).forEach(n => {
    const btn = document.getElementById('cp-'+colorKey+'-'+n);
    if(btn) { btn.style.boxShadow = ''; btn.style.transform = ''; }
  });
  const selected = document.getElementById('cp-'+colorKey+'-'+colorName);
  if(selected) { selected.style.boxShadow = '0 0 0 3px var(--accent)'; selected.style.transform = 'scale(1.1)'; }
  // Store selection temporarily
  if(!window._colorSelections) window._colorSelections = {};
  window._colorSelections[colorKey] = colorName;
}

function rteCmd(id, cmd) {
  document.getElementById(id).focus();
  document.execCommand(cmd, false, null);
}
function rteColor(id, color) {
  document.getElementById(id).focus();

}

async function saveSettingField(key, colorKey) {
  const editor = document.getElementById('rte-'+key);
  if(!editor) return;
  const value = editor.innerHTML;
  console.log('Saving setting:', key, value.substring(0,100));
  const resultEl = document.getElementById('save-result-'+key);
  try {
    // Save text
    const r = await adminPost({action:'saveSetting', key, value});
    if(!r.ok) throw new Error(r.error);
    // Save color if applicable
    if(colorKey && window._colorSelections && window._colorSelections[colorKey]) {
      await adminPost({action:'saveSetting', key:colorKey, value:window._colorSelections[colorKey]});
    }
    // SETTINGS変数も即時更新

let uploadQueue = []; // {file, name, category, status, url}

function handleUploadFiles(e) {
  const files = Array.from(e.target.files);
  files.forEach(f => {
    uploadQueue.push({ file: f, name: f.name.replace(/\.[^.]+$/, ''), category: '80cm', status: 'pending', url: '' });
  });
  renderUploadItems();
  // reset input so same file can be added again
  e.target.value = '';
}

// drag & drop
document.addEventListener('DOMContentLoaded', () => {
  const dz = document.getElementById('drop-zone');
  if (!dz) return;
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('dragover');
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    files.forEach(f => uploadQueue.push({ file: f, name: f.name.replace(/\.[^.]+$/, ''), category: '80cm', status: 'pending', url: '' }));
    renderUploadItems();
  });
});

function renderUploadItems() {
  const wrap = document.getElementById('upload-items');
  if (!wrap) return;
  if (uploadQueue.length === 0) { wrap.innerHTML = ''; return; }

  const allDone = uploadQueue.every(i => i.status === 'done');
  const anyPending = uploadQueue.some(i => i.status === 'pending');

  wrap.innerHTML = uploadQueue.map((item, idx) => {
    const preview = item.status !== 'pending' || item.previewUrl ? `<img src="${item.previewUrl||item.url||''}" onerror="this.style.display='none'">` : '';
    const statusHtml = item.status === 'uploading' ? '<span class="status-badge uploading">アップロード中…</span>'
      : item.status === 'done' ? '<span class="status-badge done">✓ 完了</span>'
      : item.status === 'error' ? '<span class="status-badge error">エラー</span>'
      : '';
    const urlHtml = item.url ? `<div class="upload-item-url">
      <input type="text" value="${item.url}" readonly onclick="this.select()">
      <button class="btn-copy" onclick="copyText('${item.url}',this)" style="font-size:11px">コピー</button>
    </div>` : '';
    return `<div class="upload-item" id="uitem-${idx}">
      <div class="upload-item-head">
        <div class="upload-item-thumb">${preview}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:500;margin-bottom:2px">${item.file.name}</div>
          <div style="font-size:11px;color:var(--muted)">${(item.file.size/1024).toFixed(0)} KB</div>
        </div>
        ${statusHtml}
        <button onclick="removeUploadItem(${idx})" style="background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px">✕</button>
      </div>
      <div class="upload-item-body">
        <div class="upload-item-fields">
          <div class="upload-item-field">
            <label>衣装名<span style="color:var(--accent)">必須</span></label>
            <input type="text" value="${item.name}" onchange="uploadQueue[${idx}].name=this.value" placeholder="例：ドレスA（白）">
          </div>
          <div class="upload-item-field">
            <label>カテゴリ<span style="color:var(--accent)">必須</span></label>
            <select onchange="uploadQueue[${idx}].category=this.value">
              ${['80cm','90cm','100cm','マタニティ'].map(c=>`<option value="${c}"${item.category===c?' selected':''}>${c}</option>`).join('')}
            </select>
          </div>
          <div class="upload-item-field" style="grid-column:1/-1">
            <label>説明文<span style="color:var(--muted);font-size:10px;margin-left:4px">任意</span></label>
            <input type="text" value="${item.note||''}" onchange="uploadQueue[${idx}].note=this.value" placeholder="例：ロンパース、ゆったりシルエット">
          </div>
        </div>
        <div style="margin-bottom:12px;">
          <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:6px;">追加写真<span style="margin-left:4px;font-size:10px;">（スライドで表示・最大4枚）</span></label>
          <div id="extra-previews-${idx}" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;"
            ondragover="event.preventDefault();this.style.outline='2px dashed var(--accent)'"
            ondragleave="this.style.outline=''"
            ondrop="event.preventDefault();this.style.outline='';Array.from(event.dataTransfer.files).filter(f=>f.type.startsWith('image/')).forEach(f=>addExtraFileObj(f,${idx}))">
            ${(item.extraFiles||[]).map((ef,ei)=>`
              <div style="position:relative;width:64px;height:64px;border-radius:8px;overflow:hidden;border:1px solid var(--border);">
                <img src="${item.extraPreviews&&item.extraPreviews[ei]||''}" style="width:100%;height:100%;object-fit:cover;">
                <button onclick="removeExtraFile(${idx},${ei})" style="position:absolute;top:2px;right:2px;width:18px;height:18px;background:rgba(0,0,0,.5);border:none;border-radius:50%;color:white;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
              </div>`).join('')}
            ${(item.extraFiles||[]).length<4?`<label style="width:64px;height:64px;border:1.5px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:var(--muted);background:var(--warm-white);">
              +<input type="file" accept="image/*" style="display:none" onchange="addExtraFile(event,${idx})">
            </label>`:''}
          </div>
        </div>
        ${urlHtml}
        ${item.status === 'pending' ? `<button class="btn-submit" style="width:100%;margin-top:4px" onclick="uploadOne(${idx})">アップロードしてURLを取得</button>` : ''}
        ${item.status === 'done' ? `<button class="btn-register" style="width:100%;margin-top:8px" onclick="registerOne(${idx})">📋 outfitsシートに登録する</button>
          <div id="reg-result-${idx}" class="register-result"></div>` : ''}
      </div>
    </div>`;
  }).join('');

  // set preview images
  uploadQueue.forEach((item, idx) => {
    if (!item.previewUrl && item.file && item.status === 'pending') {
      const reader = new FileReader();
      reader.onload = e => {
        item.previewUrl = e.target.result;
        const img = document.querySelector(`#uitem-${idx} .upload-item-thumb img`);
        if (!img) { const t = document.querySelector(`#uitem-${idx} .upload-item-thumb`); if(t) t.innerHTML = `<img src="${e.target.result}">`; }
      };
      reader.readAsDataURL(item.file);
    }
  });

  if (anyPending && uploadQueue.length > 1) {
    const allBtn = document.createElement('div');
    allBtn.style.cssText = 'margin-bottom:16px;';
    allBtn.innerHTML = `<button class="btn-submit" style="width:100%" onclick="uploadAll()">📷 まとめてアップロード（${uploadQueue.filter(i=>i.status==='pending').length}枚）</button>`;
    wrap.insertBefore(allBtn, wrap.firstChild);
  }
}

function addExtraFile(e,idx){
  const f=e.target.files[0];if(!f)return;
  addExtraFileObj(f,idx);
  e.target.value='';
}
function addExtraFileObj(f,idx){
  if(!uploadQueue[idx].extraFiles)uploadQueue[idx].extraFiles=[];
  if(!uploadQueue[idx].extraPreviews)uploadQueue[idx].extraPreviews=[];
  if(uploadQueue[idx].extraFiles.length>=4)return;
  uploadQueue[idx].extraFiles.push(f);
  const reader=new FileReader();
  reader.onload=ev=>{
    uploadQueue[idx].extraPreviews.push(ev.target.result);
    renderUploadItems();
  };
  reader.readAsDataURL(f);
}
function removeExtraFile(idx,ei){
  uploadQueue[idx].extraFiles.splice(ei,1);
  uploadQueue[idx].extraPreviews.splice(ei,1);
  renderUploadItems();
}
function removeUploadItem(idx) {
  uploadQueue.splice(idx, 1);
  renderUploadItems();
}

async function uploadOne(idx) {
  const item = uploadQueue[idx];
  if (!item.name.trim()) { alert('衣装名を入力してください'); return; }
  item.status = 'uploading';
  renderUploadItems();
  try {
    // メイン写真アップロード
    const b64 = await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(item.file); });
    const result = await adminPost({ action: 'uploadOutfitImage', b64, filename: item.file.name });
    if (!result.ok) { item.status = 'error'; renderUploadItems(); return; }
    item.url = result.url;
    // 追加写真アップロード
    item.imgs = '';
    if(item.extraFiles && item.extraFiles.length > 0){
      const extraUrls = [];
      for(const ef of item.extraFiles){
        const eb64 = await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(ef); });
        const er = await adminPost({ action: 'uploadOutfitImage', b64: eb64, filename: ef.name });
        if(er.ok) extraUrls.push(er.url);
      }
      item.imgs = extraUrls.join(',');
    }
    item.status = 'done';
  } catch(e) {
    item.status = 'error';
  }
  renderUploadItems();
}

async function uploadAll() {
  const pending = uploadQueue.filter(i => i.status === 'pending');
  for (const item of pending) {
    const idx = uploadQueue.indexOf(item);
    await uploadOne(idx);
  }
}

async function registerOne(idx) {
  const item = uploadQueue[idx];
  if (!item.url) return;
  const btn = document.querySelector(`#uitem-${idx} .btn-register`);
  const result_el = document.getElementById('reg-result-' + idx);
  if (btn) { btn.disabled = true; btn.textContent = '登録中…'; }
  try {
    const id = 'o_' + Date.now() + '_' + Math.random().toString(36).slice(2,5);
    const r = await adminPost({ action: 'registerOutfit', id, name: item.name, category: item.category, imageURL: item.url, note: item.note||'', imgs: item.imgs||'' });
    if (r.ok) {
      if (result_el) { result_el.textContent = '✓ outfitsシートに登録しました！'; result_el.className = 'register-result ok show'; }
      if (btn) btn.style.display = 'none';
    } else {
      if (result_el) { result_el.textContent = 'エラー：' + (r.error || ''); result_el.className = 'register-result err show'; }
      if (btn) { btn.disabled = false; btn.textContent = '📋 outfitsシートに登録する'; }
    }
  } catch(e) {
    if (result_el) { result_el.textContent = '通信エラーが発生しました'; result_el.className = 'register-result err show'; }
    if (btn) { btn.disabled = false; btn.textContent = '📋 outfitsシートに登録する'; }
  }
}

function slideOutfit(id,dir){

  const keys={flower:'flower_detail',hair:'hair_detail',outfit:'outfit_detail'};
  document.getElementById('option-modal-title').textContent=titles[type]||'';
  document.getElementById('option-modal-body').innerHTML=SETTINGS[keys[type]]||'';
  document.getElementById('option-modal').classList.add('open');
}
function closeOptionDetail(){document.getElementById('option-modal').classList.remove('open');}

  return '';// GASから返ってくるようにするか、直接URLを埋め込む

function noticeStyle(colorName) {
  const map = {
    cream:  'background:#F0E6D8;border-left-color:#C4956A;',
    pink:   'background:#FBEAF0;border-left-color:#ED93B1;',
    blue:   'background:#E6F1FB;border-left-color:#85B7EB;',
    green:  'background:#EAF3DE;border-left-color:#8DC86A;',
    orange: 'background:#FEF3E2;border-left-color:#F5C26B;',
    white:  'background:#FFFEFB;border-left-color:#E8E0D5;',
  };
  return map[colorName] || map.cream;
}
function fmtD(s){if(!s)return'';try{const d=new Date(s);if(!isNaN(d))return d.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',timeZone:'Asia/Tokyo'});}catch(e){}return String(s).slice(0,10);}
function fmtDT(s){if(!s)return'';if(!String(s).includes('GMT'))return s;try{const d=new Date(s);if(!isNaN(d))return d.toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',timeZone:'Asia/Tokyo'});}catch(e){}return s;}
function copyText(t,btn){navigator.clipboard.writeText(t).then(()=>{btn.textContent='コピー完了!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='コピー';btn.classList.remove('copied');},2000);});}
let lbImgs=[],lbIdx=0;
function openLightbox(s){openOutfitLightbox(null,[s],0);}
function openOutfitLightbox(id,imgs,startIdx){
  lbImgs=imgs||[];lbIdx=startIdx||0;
  if(!lbImgs.length)return;
  document.getElementById('lightbox-img').src=lbImgs[lbIdx];
  document.getElementById('lightbox').classList.add('open');
  const prev=document.getElementById('lb-prev');
  const next=document.getElementById('lb-next');
  const dots=document.getElementById('lb-dots');
  if(lbImgs.length>1){
    prev.style.display='block';next.style.display='block';
    dots.innerHTML=lbImgs.map((_,i)=>`<div style="width:8px;height:8px;border-radius:50%;background:${i===lbIdx?'white':'rgba(255,255,255,.4)'}"></div>`).join('');
  }else{
    prev.style.display='none';next.style.display='none';dots.innerHTML='';
  }
}
function lbSlide(dir){
  lbIdx=(lbIdx+dir+lbImgs.length)%lbImgs.length;
  document.getElementById('lightbox-img').src=lbImgs[lbIdx];
  const dots=document.getElementById('lb-dots');
  if(dots)dots.innerHTML=lbImgs.map((_,i)=>`<div style="width:8px;height:8px;border-radius:50%;background:${i===lbIdx?'white':'rgba(255,255,255,.4)'}"></div>`).join('');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');lbImgs=[];lbIdx=0;}
